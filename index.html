<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flipkart Product</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
    }

    /* Fake Flipkart header */
    .header {
        background: #2874f0;
        color: white;
        padding: 15px;
        font-size: 20px;
    }

    .product {
        padding: 20px;
    }

    .product img {
        width: 200px;
    }

    .title {
        font-size: 22px;
        margin: 10px 0;
    }

    .price {
        color: green;
        font-size: 20px;
    }

    button {
        padding: 10px 20px;
        background: orange;
        border: none;
        cursor: pointer;
        margin-top: 10px;
    }

    /* FULLSCREEN VIDEO */
    #videoContainer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: black;
        display: none;
        z-index: 999;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #message {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 40px;
        display: none;
    }

    footer {
        position: fixed;
        bottom: 10px;
        width: 100%;
        text-align: center;
        color: white;
        z-index: 1000;
    }
</style>
</head>

<body>

<div class="header">Flipkart 😎</div>

<div class="product">
    <img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/1/2/a/-original-imagxyz.jpg">
    <div class="title">iPhone 15 Pro Max 😍</div>
    <div class="price">₹1,59,999</div>
    <button>Buy Now</button>
</div>

<!-- VIDEO OVERLAY -->
<div id="videoContainer">
    <video id="video" src="vd.mp4"></video>
    <div id="message">😈 Sorry... April Fool 😈</div>
    <footer>Created by Dev</footer>
</div>

<script>
const videoContainer = document.getElementById("videoContainer");
const video = document.getElementById("video");
let triggered = false;

// Trigger prank on ANY click
document.body.addEventListener("click", () => {
    if (!triggered) {
        triggered = true;

        videoContainer.style.display = "block";
        video.muted = false;
        video.play();
    }
});

// Show message after video ends
video.onended = () => {
    document.getElementById("message").style.display = "block";
};
</script>

</body>
</html>
